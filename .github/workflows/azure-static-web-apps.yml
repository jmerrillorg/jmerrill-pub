name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Guard catalog runtime source
        run: node scripts/check-catalog-runtime-source.mjs

      - name: Prepare author gate build environment
        shell: bash
        env:
          AUTHOR_ONBOARDING_ACCESS_CODE: ${{ secrets.AUTHOR_ONBOARDING_ACCESS_CODE }}
          AUTHOR_PORTAL_ACCESS_CODE_PEPPER: ${{ secrets.AUTHOR_PORTAL_ACCESS_CODE_PEPPER }}
          AUTHOR_PORTAL_ACCESS_RECORDS_JSON: ${{ secrets.AUTHOR_PORTAL_ACCESS_RECORDS_JSON }}
          AUTHOR_PORTAL_ACCESS_REGISTRY_JSON: ${{ secrets.AUTHOR_PORTAL_ACCESS_REGISTRY_JSON }}
          AUTHOR_PORTAL_MASTER_ACCESS_CODE: ${{ secrets.AUTHOR_PORTAL_MASTER_ACCESS_CODE }}
          AUTHOR_PORTAL_SESSION_SECRET: ${{ secrets.AUTHOR_PORTAL_SESSION_SECRET }}
        run: |
          umask 177
          cat > .env.production <<EOF
          AUTHOR_ONBOARDING_ACCESS_CODE=${AUTHOR_ONBOARDING_ACCESS_CODE}
          AUTHOR_PORTAL_ACCESS_CODE_PEPPER=${AUTHOR_PORTAL_ACCESS_CODE_PEPPER}
          AUTHOR_PORTAL_ACCESS_RECORDS_JSON=${AUTHOR_PORTAL_ACCESS_RECORDS_JSON}
          AUTHOR_PORTAL_ACCESS_REGISTRY_JSON=${AUTHOR_PORTAL_ACCESS_REGISTRY_JSON}
          AUTHOR_PORTAL_MASTER_ACCESS_CODE=${AUTHOR_PORTAL_MASTER_ACCESS_CODE}
          AUTHOR_PORTAL_SESSION_SECRET=${AUTHOR_PORTAL_SESSION_SECRET}
          EOF

      - name: Build and Deploy
        id: builddeploy
        uses: azure/static-web-apps-deploy@latest
        env:
          AUTHOR_ONBOARDING_ACCESS_CODE: ${{ secrets.AUTHOR_ONBOARDING_ACCESS_CODE }}
          AUTHOR_PORTAL_ACCESS_CODE_PEPPER: ${{ secrets.AUTHOR_PORTAL_ACCESS_CODE_PEPPER }}
          AUTHOR_PORTAL_ACCESS_RECORDS_JSON: ${{ secrets.AUTHOR_PORTAL_ACCESS_RECORDS_JSON }}
          AUTHOR_PORTAL_ACCESS_REGISTRY_JSON: ${{ secrets.AUTHOR_PORTAL_ACCESS_REGISTRY_JSON }}
          AUTHOR_PORTAL_MASTER_ACCESS_CODE: ${{ secrets.AUTHOR_PORTAL_MASTER_ACCESS_CODE }}
          AUTHOR_PORTAL_SESSION_SECRET: ${{ secrets.AUTHOR_PORTAL_SESSION_SECRET }}
          DATAVERSE_TENANT_ID: ${{ secrets.DATAVERSE_TENANT_ID }}
          DATAVERSE_CLIENT_ID: ${{ secrets.DATAVERSE_CLIENT_ID }}
          DATAVERSE_CLIENT_SECRET: ${{ secrets.DATAVERSE_CLIENT_SECRET }}
          DATAVERSE_RESOURCE_URL: ${{ secrets.DATAVERSE_RESOURCE_URL }}
          DATAVERSE_WEB_API_BASE_URL: ${{ secrets.DATAVERSE_WEB_API_BASE_URL }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "/"
          api_location: ""
          output_location: ""

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Close Pull Request Deployment
        uses: azure/static-web-apps-deploy@latest
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
